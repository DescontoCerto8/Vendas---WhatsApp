<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atendimento</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  max-width: 400px;
  margin: auto;
}

.titulo {
  background: #25D366;
  padding: 18px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
}

#produto {
  margin: 15px 0;
  font-size: 16px;
}

.botao {
  display: block;
  margin-top: 20px;
  background: #25D366;
  padding: 18px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <div class="titulo">Fale com um de nossos vendedores</div>
  <p id="produto"></p>
  <a id="btn" class="botao" href="#">Falar no WhatsApp</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const produto = params.get('produto') || 'um produto';

document.getElementById("produto").innerText = "Produto: " + produto;

const vendedores = [
  "556684594406",
  "556684426563"
];

let contador = localStorage.getItem("contador") || 0;

const vendedor = vendedores[contador % vendedores.length];

localStorage.setItem("contador", parseInt(contador) + 1);

const mensagem = `Olá! Vim do Google e quero esse produto: ${produto}`;

document.getElementById("btn").href =
"https://wa.me/" + vendedor + "?text=" + encodeURIComponent(mensagem);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Atendimento</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .titulo {
      font-size: 22px;
      margin-bottom: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 12px;
      display: inline-block;
    }

    #produto {
      margin: 15px 0;
      font-size: 16px;
      color: #ddd;
    }

    .botoes {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .botao {
      background: #25D366;
      color: white;
      padding: 15px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      min-width: 120px;
    }

    .botao:hover {
      background: #1ebe5d;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<div class="box">

  <div class="titulo">
    Fale com um de nossos vendedores
  </div>

  <p id="produto"></p>

  <div style="botoes">
    <a id="hakila" class="botao" href="#">Hakila</a>
    <a id="bruna" class="botao" href="#">Bruna</a>
    <a id="fagner" class="botao" href="#">Fagner</a>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const produto = params.get('produto') || 'um produto';

document.getElementById("produto").innerText = "Produto: " + produto;

const mensagem = `Olá! Vim do Google e quero esse produto: ${produto}`;

document.getElementById("hakila").href =
"https://wa.me/5599999999999?text=" + encodeURIComponent(mensagem);

document.getElementById("bruna").href =
"https://wa.me/5588888888888?text=" + encodeURIComponent(mensagem);

document.getElementById("fagner").href =
"https://wa.me/5577777777777?text=" + encodeURIComponent(mensagem);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atendimento</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  max-width: 500px;
  margin: auto;
}

.titulo {
  background: #25D366;
  padding: 18px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
}

#produto {
  margin: 15px 0;
  font-size: 16px;
}

.botoes {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.botao {
  flex: 1;
  background: #25D366;
  padding: 18px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">

<div class="titulo">Fale com um de nossos vendedores</div>

<p id="produto"></p>

<div class="botoes">
  <a id="Vendedores" class="botao" href="#">Vendedores</a>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const produto = params.get('produto') || 'um produto';
const codigo = params.get('codigo') || 'sem código';

document.getElementById("produto").innerText =
"Produto: " + produto + " | Código: " + codigo;

const mensagem =
`Olá! quero esse produto: ${produto}, Código ${codigo}`;

 document.getElementById("Vendedores").href =
"https://wa.me/556692202274?text=" + encodeURIComponent(mensagem);

</script>

</body>
</html>
